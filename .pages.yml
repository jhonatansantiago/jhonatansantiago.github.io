media:
  input: imagens
  output: /imagens

content:
  - name: casos
    label: Investigações / Casos
    type: collection
    path: casos.json
    format: json
    list: true
    fields:
      - name: id
        label: Número do Caso (Ex: CASE_001)
        type: string
      - name: category
        label: Categoria Técnica
        type: string
      - name: title
        label: Título do Caso
        type: string
      - name: description
        label: Descrição Resumida (Para a home)
        type: text
      - name: system
        label: Sistema Analisado (Ex: Windows, Mobile)
        type: string
      - name: statusVal
        label: Status
        type: select
        options:
          - Resolvido
          - Em Análise
      - name: statusTag
        label: Etiqueta de Status (Resolvido, Em Andamento)
        type: string
      - name: statusColor
        label: Cor do Status (green, yellow, red)
        type: string
      - name: visibility
        label: Visibilidade (PÚBLICO, RESTRITO)
        type: string
      - name: visColor
        label: Cor da Visibilidade (cyan, red)
        type: string
      - name: img
        label: Imagem de Capa
        type: image
      - name: metodologia
        label: Metodologia Aplicada
        type: text
      - name: resultado
        label: Resultado Pericial
        type: text

  - name: artigos
    label: Artigos e Debates
    type: collection
    path: artigos.json
    format: json
    list: true
    fields:
      - name: id
        label: Identificador / Código (Ex: L0G_2024.10.15)
        type: string
      - name: title
        label: Título do Artigo
        type: string
      - name: category
        label: Categoria
        type: string
      - name: readTime
        label: Tempo de Leitura (Ex: 5 min de leitura)
        type: string
      - name: img
        label: Imagem de Capa
        type: image
      - name: description
        label: Descrição Resumida
        type: text
      - name: content
        label: Conteúdo do Artigo (Aceita tags HTML <p>, <h3>)
        type: text
