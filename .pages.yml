media:
  input: imagens
  output: /imagens

content:
  - name: casos
    label: Casos Periciais
    type: collection
    path: casos.json
    format: json
    fields:
      - name: id
        label: Codigo do Caso
        type: string
      - name: title
        label: Titulo do Caso
        type: string
      - name: category
        label: Categoria Tecnica
        type: string
      - name: description
        label: Descricao Resumida
        type: text
      - name: system
        label: Sistema Analisado
        type: string
      - name: statusVal
        label: Status do Caso
        type: select
        options:
          - Resolvido
          - Em Analise
      - name: statusTag
        label: Etiqueta de Status
        type: select
        options:
          - Resolvido
          - Em Andamento
      - name: statusColor
        label: Cor do Status
        type: select
        options:
          - green
          - yellow
          - red
      - name: visibility
        label: Visibilidade
        type: select
        options:
          - PUBLICO
          - RESTRITO
      - name: visColor
        label: Cor da Visibilidade
        type: select
        options:
          - cyan
          - red
      - name: img
        label: Imagem de Capa
        type: image
      - name: metodologia
        label: Metodologia
        type: text
      - name: resultado
        label: Resultado Pericial
        type: text

  - name: artigos
    label: Artigos e Debates
    type: collection
    path: artigos.json
    format: json
    fields:
      - name: id
        label: Identificador
        type: string
      - name: title
        label: Titulo
        type: string
      - name: category
        label: Categoria
        type: string
      - name: readTime
        label: Tempo de Leitura
        type: string
      - name: img
        label: Imagem
        type: image
      - name: description
        label: Descricao
        type: text
      - name: content
        label: Conteudo HTML
        type: text
```eof

4. Salve as alterações (Commit changes).
5. No Pages CMS, force a atualização da página (F5 ou `Ctrl+Shift+R`).

Isso fará com que o Pages CMS entenda corretamente que `casos.json` e `artigos.json` são listas padronizadas, sem usar rótulos complexos que estavam confundindo a biblioteca React que roda a interface do CMS. Agora o botão de "Criar Novo" em ambas as seções deve carregar perfeitamente os formulários sem exibir o Erro 31.
