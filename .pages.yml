media:
  input: imagens
  output: /imagens

content:
  - name: casos
    label: Investigações / Casos
    type: file
    path: casos.json
    format: json
    list: true
    fields:
      - name: id
        label: Código do Caso
        type: string
      - name: title
        label: Título do Caso
        type: string
      - name: category
        label: Categoria Técnica
        type: string
      - name: description
        label: Descrição Resumida
        type: text
      - name: system
        label: Sistema Analisado
        type: string
      - name: statusVal
        label: Status do Caso
        type: select
        options:
          - Resolvido
          - Em Análise
      - name: statusTag
        label: Etiqueta de Status
        type: select
        options:
          - Resolvido
          - Em Andamento
      - name: statusColor
        label: Cor do Status
        type: select
        options:
          - green
          - yellow
          - red
      - name: visibility
        label: Visibilidade
        type: select
        options:
          - PÚBLICO
          - RESTRITO
      - name: visColor
        label: Cor da Visibilidade
        type: select
        options:
          - cyan
          - red
      - name: img
        label: Imagem de Capa
        type: image
      - name: metodologia
        label: Metodologia Aplicada
        type: rich-text
      - name: resultado
        label: Resultado Pericial
        type: rich-text

  - name: artigos
    label: Artigos e Debates
    type: file
    path: artigos.json
    format: json
    list: true
    fields:
      - name: id
        label: Identificador
        type: string
      - name: title
        label: Título
        type: string
      - name: category
        label: Categoria
        type: string
      - name: readTime
        label: Tempo de Leitura
        type: string
      - name: img
        label: Imagem
        type: image
      - name: description
        label: Descrição
        type: text
      - name: content
        label: Conteúdo do Artigo
        type: rich-text
```eof

4.  **Salve** (Commit changes).
5.  Dê um **F5** forte no Pages CMS (você pode precisar limpar o cache ou clicar em "Go home" e tentar de novo).

Agora, em vez do erro, você deve ver os seus formulários abrindo lindamente, e os campos "Metodologia", "Resultado" e "Conteúdo" aparecerão como caixas de edição de texto onde você pode colocar negrito, links e parágrafos de forma fácil!
