media:
  input: imagens
  output: /imagens

content:
  - name: casos
    label: Investigações / Casos
    type: file
    path: casos.json
    format: json
    list: true
    fields:
      - name: id
        label: Código do Caso
        type: string
      - name: title
        label: Título do Caso
        type: string
      - name: category
        label: Categoria Técnica
        type: string
      - name: description
        label: Descrição Resumida
        type: text
      - name: system
        label: Sistema Analisado
        type: string
      - name: statusVal
        label: Status do Caso
        type: select
        options:
          - Resolvido
          - Em Análise
      - name: statusTag
        label: Etiqueta de Status
        type: select
        options:
          - Resolvido
          - Em Andamento
      - name: statusColor
        label: Cor do Status
        type: select
        options:
          - green
          - yellow
          - red
      - name: visibility
        label: Visibilidade
        type: select
        options:
          - PUBLICO
          - RESTRITO
      - name: visColor
        label: Cor da Visibilidade
        type: select
        options:
          - cyan
          - red
      - name: img
        label: Imagem de Capa
        type: image
      - name: metodologia
        label: Metodologia Aplicada
        type: code
      - name: resultado
        label: Resultado Pericial
        type: code

  - name: artigos
    label: Artigos e Debates
    type: file
    path: artigos.json
    format: json
    list: true
    fields:
      - name: id
        label: Identificador
        type: string
      - name: title
        label: Título
        type: string
      - name: category
        label: Categoria
        type: string
      - name: readTime
        label: Tempo de Leitura
        type: string
      - name: img
        label: Imagem
        type: image
      - name: description
        label: Descrição
        type: text
      - name: content
        label: Conteúdo HTML
        type: code
```eof

### O que mudou e por que agora vai funcionar?
*   A chave **`type: collection`** (que espera uma pasta) foi trocada para **`type: file`** (que espera um arquivo único).
*   A chave **`list: true`** foi adicionada logo abaixo do caminho do arquivo. Isso diz ao CMS: "Este arquivo é apenas uma grande lista de objetos. Deixe o usuário adicionar ou remover blocos dentro dela".

Com essa configuração, o CMS vai encontrar seus arquivos `casos.json` e `artigos.json` com sucesso, ler a lista que está lá dentro (que você criou usando meus códigos anteriores) e abrir a interface corretamente, sem esperar por uma pasta (directory entries).

Basta comitar (salvar) o `.pages.yml` e dar F5 no painel do Pages CMS!
